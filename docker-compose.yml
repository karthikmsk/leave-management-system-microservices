services:

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: K@rthikms@2
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d

  eureka-server:
    build:
      context: "./eureka server/eureka-server"
    image: eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"

  user-service:
    build:
      context: "./user-service"
    image: user-service
    container_name: user-service
    ports:
      - "8088:8088"
    depends_on:
      - postgres
      - eureka-server

  leave-service:
    build:
      context: "./leave service/leave-service"
    image: leave-service
    container_name: leave-service
    ports:
      - "8087:8087"
    depends_on:
      - postgres
      - eureka-server

  api-gateway:
    build:
      context: "./API Gateway/API-Gateway"
    image: api-gateway
    container_name: api-gateway
    ports:
      - "8000:8000"
    depends_on:
      - user-service
      - leave-service
      - eureka-server

volumes:
  postgres-data: